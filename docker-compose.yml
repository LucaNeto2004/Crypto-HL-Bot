services:
  bot:
    build: .
    container_name: hl-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config/deployed:/app/config/deployed
    networks:
      - hl-net

  dashboard:
    build: .
    container_name: hl-dashboard
    command: python dashboard.py
    restart: unless-stopped
    env_file: .env
    ports:
      - "5050:5050"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config/deployed:/app/config/deployed
    networks:
      - hl-net

  n8n:
    image: n8nio/n8n
    container_name: hl-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    env_file: .env
    environment:
      - N8N_SECURE_COOKIE=false
    networks:
      - hl-net

volumes:
  n8n_data:

networks:
  hl-net:
    driver: bridge
